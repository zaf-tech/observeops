skill_id: 6
name: ReportSynthesizer
display_name: Report Synthesizer
icon: "📋"
description: >
  Aggregates all findings from Skills 1-5 and generates an executive-grade
  infrastructure audit report using the configured LLM. Produces a structured
  Markdown report with Platform Overview, Executive Summary, prioritised findings,
  risk breakdown table, and recommended action plan. Falls back to a structured
  template if the LLM is unavailable.
llm_role: reporting
plugins: {}
report_sections:
  - Platform Overview
  - Executive Summary
  - Critical & High Priority Issues
  - Medium & Low Priority Issues
  - Risk Breakdown Table
  - Recommended Action Plan
  - Positive Observations
